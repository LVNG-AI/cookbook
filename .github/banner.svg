<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d0d1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D2FF;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00D2FF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#6C5CE7;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D2FF" />
      <stop offset="100%" style="stop-color:#6C5CE7" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="12" />

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="300" /><line x1="50" y1="0" x2="50" y2="300" />
    <line x1="100" y1="0" x2="100" y2="300" /><line x1="150" y1="0" x2="150" y2="300" />
    <line x1="200" y1="0" x2="200" y2="300" /><line x1="250" y1="0" x2="250" y2="300" />
    <line x1="300" y1="0" x2="300" y2="300" /><line x1="350" y1="0" x2="350" y2="300" />
    <line x1="400" y1="0" x2="400" y2="300" /><line x1="450" y1="0" x2="450" y2="300" />
    <line x1="500" y1="0" x2="500" y2="300" /><line x1="550" y1="0" x2="550" y2="300" />
    <line x1="600" y1="0" x2="600" y2="300" /><line x1="650" y1="0" x2="650" y2="300" />
    <line x1="700" y1="0" x2="700" y2="300" /><line x1="750" y1="0" x2="750" y2="300" />
    <line x1="800" y1="0" x2="800" y2="300" /><line x1="850" y1="0" x2="850" y2="300" />
    <line x1="900" y1="0" x2="900" y2="300" />
    <line x1="0" y1="50" x2="900" y2="50" /><line x1="0" y1="100" x2="900" y2="100" />
    <line x1="0" y1="150" x2="900" y2="150" /><line x1="0" y1="200" x2="900" y2="200" />
    <line x1="0" y1="250" x2="900" y2="250" />
  </g>

  <!-- Glow orbs -->
  <circle cx="200" cy="150" r="120" fill="#00D2FF" opacity="0.08" filter="url(#blur)" />
  <circle cx="700" cy="150" r="120" fill="#6C5CE7" opacity="0.08" filter="url(#blur)" />

  <!-- Accent line -->
  <rect x="100" y="210" width="700" height="2" fill="url(#glow)" rx="1" />

  <!-- Title -->
  <text x="450" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="56" fill="white" letter-spacing="-1">
    LVNG Cookbook
  </text>

  <!-- Subtitle -->
  <text x="450" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="18" fill="#8888aa" letter-spacing="1">
    API recipes in cURL / TypeScript / Python / Node.js
  </text>

  <!-- Bottom tags -->
  <g transform="translate(230, 240)">
    <rect width="80" height="26" rx="13" fill="#00D2FF" opacity="0.15" />
    <text x="40" y="17" text-anchor="middle" font-family="monospace" font-size="11" fill="#00D2FF" font-weight="600">21 Tools</text>
  </g>
  <g transform="translate(330, 240)">
    <rect width="100" height="26" rx="13" fill="#6C5CE7" opacity="0.15" />
    <text x="50" y="17" text-anchor="middle" font-family="monospace" font-size="11" fill="#6C5CE7" font-weight="600">17 API Groups</text>
  </g>
  <g transform="translate(450, 240)">
    <rect width="96" height="26" rx="13" fill="#FF6B6B" opacity="0.15" />
    <text x="48" y="17" text-anchor="middle" font-family="monospace" font-size="11" fill="#FF6B6B" font-weight="600">Claude Code</text>
  </g>
  <g transform="translate(566, 240)">
    <rect width="80" height="26" rx="13" fill="#FFA502" opacity="0.15" />
    <text x="40" y="17" text-anchor="middle" font-family="monospace" font-size="11" fill="#FFA502" font-weight="600">OpenAPI</text>
  </g>
</svg>
